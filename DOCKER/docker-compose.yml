name: geomed

services:
  backend:
    build:
      context: ../BACKEND
      dockerfile: Dockerfile
    env_file:
      - ../BACKEND/.env
    environment:
      - FRONTEND_URL=http://localhost:3001
    ports:
      - "8000:8000"
    volumes:
      - ../BACKEND:/app
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  telegram_bot:
    build:
      context: ../BACKEND
      dockerfile: Dockerfile
    env_file:
      - ../BACKEND/.env
    volumes:
      - ../BACKEND:/app
    restart: unless-stopped
    command: python start_telegram_bot.py

  frontend:
    build:
      context: ../FRONTEND
      dockerfile: Dockerfile
      target: deps
    ports:
      - "3001:5173"
    depends_on:
      - backend
    volumes:
      - ../FRONTEND:/app
      - /app/node_modules
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0 --port 5173
